# Scrub detector spec — single source of truth for the scrub engine.
#
# version MUST be bumped on ANY change to this file (detector added, removed,
# reordered, regex or token edited). TestSpecHashPinsVersion enforces this by
# pinning the file hash; editing the spec without bumping fails the suite.
#
# Declaration order matters: overlap resolution breaks ties by earlier
# declaration. Keep most-specific first (providers), usage-shape detectors
# (bearer/assignment/url) after providers so a provider token wins the tie
# when both match the same span, broad PII (phone/ip/email) last.
#
# Detector fields:
#   name        stable identifier used in per_pattern_counts + corpus
#   class       provider | usage | pii   (documentation only; engine ignores)
#   token       replacement text spliced over the redaction span
#   regex       Go RE2. With `group`, only that capture group is redacted.
#   group       capture-group index to redact (0/absent = whole match)
#   needles     substring prefilter — skip regex unless one needle present
#   needles_ci  when true, needles match case-insensitively
#   window      when > 0, the regex runs only on a window of this many bytes
#               after each needle hit (plus a small left margin) instead of
#               sweeping the whole text. Use for detectors whose needles are
#               common prose words (token, auth, key) — keeps the scrub
#               latency budget on 10 KB bodies. The regex MUST bound its
#               match length below the window or long matches get truncated.
#   guard_chars windowed detectors only: skip the window unless one of these
#               bytes appears within 64 bytes after the needle. Filters prose
#               mentions ("rotate the token nightly") from real assignments
#               ("token = ...") before paying the regex cost.
#   validator   optional structural gate: ipv4_octets | entropy
#   min_entropy Shannon bits/char threshold (validator: entropy only)

version: 3

detectors:
  - name: pem_key
    class: provider
    token: "[PEM_KEY]"
    regex: '(?s)-----BEGIN [A-Z0-9 ]+PRIVATE KEY-----.*?-----END [A-Z0-9 ]+PRIVATE KEY-----'
    needles: ["-----BEGIN"]

  - name: jwt
    class: provider
    token: "[JWT]"
    regex: '\beyJ[A-Za-z0-9_\-]+\.eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+'
    needles: ["eyJ"]

  - name: aws_key
    class: provider
    token: "[AWS_KEY]"
    regex: '\b(?:AKIA|ASIA|AROA|AGPA|ANPA|ANVA|AIPA)[0-9A-Z]{16}\b'
    needles: ["AKIA", "ASIA", "AROA", "AGPA", "ANPA", "ANVA", "AIPA"]

  - name: github_token
    class: provider
    token: "[GITHUB_TOKEN]"
    regex: '\bgh[pousr]_[A-Za-z0-9]{36,255}\b'
    needles: ["ghp_", "ghs_", "gho_", "ghu_", "ghr_"]

  - name: github_pat
    class: provider
    token: "[GITHUB_TOKEN]"
    regex: '\bgithub_pat_[A-Za-z0-9_]{36,255}\b'
    needles: ["github_pat_"]

  - name: gitlab_pat
    class: provider
    token: "[GITLAB_TOKEN]"
    regex: '\bglpat-[A-Za-z0-9_\-]{20,}\b'
    needles: ["glpat-"]

  - name: google_api_key
    class: provider
    token: "[GOOGLE_KEY]"
    regex: '\bAIza[0-9A-Za-z_\-]{35}\b'
    needles: ["AIza"]

  - name: npm_token
    class: provider
    token: "[NPM_TOKEN]"
    regex: '\bnpm_[A-Za-z0-9]{36}\b'
    needles: ["npm_"]

  - name: stripe_key
    class: provider
    token: "[STRIPE_KEY]"
    regex: '\b(?:sk|pk|rk)_(?:live|test)_[A-Za-z0-9]{20,247}\b'
    needles: ["sk_live_", "sk_test_", "pk_live_", "pk_test_", "rk_live_", "rk_test_"]

  - name: slack_token
    class: provider
    token: "[SLACK_TOKEN]"
    regex: '\bxox[abprs]-[A-Za-z0-9\-]{20,}\b'
    needles: ["xoxa-", "xoxb-", "xoxp-", "xoxr-", "xoxs-"]

  - name: anthropic_key
    class: provider
    token: "[ANTHROPIC_KEY]"
    regex: '\bsk-ant-[A-Za-z0-9_\-]{50,}\b'
    needles: ["sk-ant-"]

  - name: openai_key
    class: provider
    token: "[OPENAI_KEY]"
    regex: '\bsk-[A-Za-z0-9_\-]{20,200}\b'
    needles: ["sk-"]

  # ── usage-shape detectors ────────────────────────────────────────────────
  # Catch secrets no provider prefix can enumerate: the value is identified by
  # how it is used (bearer header, assignment, URL credential position).

  - name: bearer_token
    class: usage
    token: "[SECRET]"
    regex: '(?i)\bbearer\s+([A-Za-z0-9+/=_.\-]{8,256})'
    group: 1
    needles: ["bearer"]
    needles_ci: true
    window: 512
    validator: entropy
    min_entropy: 3.5

  - name: assignment_secret
    class: usage
    token: "[SECRET]"
    regex: '(?i)\b(?:api[_-]?key|access[_-]?key|secret(?:[_-]?key)?|token|passwd|password|pwd|auth(?:orization)?|credentials?)\b["'']?\s*[:=]\s*["'']?([A-Za-z0-9+/=_.\-]{8,256})'
    group: 1
    needles: ["key", "secret", "token", "passw", "pwd", "auth", "credential"]
    needles_ci: true
    window: 512
    guard_chars: ":="
    validator: entropy
    min_entropy: 3.5

  - name: url_credential
    class: usage
    token: "[SECRET]"
    # Password component of scheme://user:password@host. No entropy gate —
    # the position alone proves the value is a credential.
    regex: '[A-Za-z][A-Za-z0-9+.\-]*://[^:/?#\s@]+:([^@/?#\s]{1,256})@'
    group: 1
    needles: ["://"]
    window: 512

  # ── PII detectors ────────────────────────────────────────────────────────

  - name: phone
    class: pii
    token: "[PHONE]"
    regex: '\+[1-9]\d{1,14}\b'
    needles: ["+"]

  - name: private_ipv4
    class: pii
    token: "[PRIVATE_IP]"
    regex: '\b(?:10|127)\.\d{1,3}\.\d{1,3}\.\d{1,3}\b|\b172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}\b|\b192\.168\.\d{1,3}\.\d{1,3}\b'
    needles: ["10.", "127.", "172.", "192.168."]
    validator: ipv4_octets

  - name: email
    class: pii
    token: "[EMAIL]"
    regex: '\b[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}\b'
    needles: ["@"]
