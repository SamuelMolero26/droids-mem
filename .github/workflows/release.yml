name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: go.sum

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          OUT="dist/droids-mem-${{ steps.version.outputs.tag }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath -ldflags "-s -w -X main.version=${{ steps.version.outputs.tag }}" -o "$OUT" ./cmd/droids-mem
          (cd dist && sha256sum "$(basename "$OUT")" > "$(basename "$OUT").sha256")
          ls -lh dist/

      - name: Verify binary size (< 20 MB)
        run: |
          SIZE=$(stat -c %s dist/droids-mem-${{ steps.version.outputs.tag }}-${{ matrix.goos }}-${{ matrix.goarch }})
          MAX=$((20 * 1024 * 1024))
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "Binary size $SIZE exceeds 20 MB limit"
            exit 1
          fi
          echo "Binary size: $SIZE bytes (limit: $MAX)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: droids-mem-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          {
            echo "## droids-mem $TAG"
            echo
            echo "See [CHANGELOG.md](./CHANGELOG.md) for full release notes."
            echo
            echo "### Install"
            echo
            echo '```'
            echo "go install github.com/samuelmolero/droids-mem/cmd/droids-mem@$TAG"
            echo '```'
            echo
            echo "Or download a prebuilt binary below. Each artifact ships with a \`.sha256\` checksum."
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            dist/*
